# NPC_Registry.yaml
# The Glade — NPC Registry
# Source of truth for all named NPCs. Update via /scribe or /session-over only.

npcs:

  # ── ACTIVE / DEVELOPED ──────────────────────────────────────────────────────

  - name: Francesca Booloticia IV
    informal name: Boodle
    species: Jewel beetle
    role: Merchant guild representative
    affiliation: Merchant guilds
    status: Alive
    location: Chitinholm
    disposition: Positive
    first_met: Session 0
    last_seen: Session 1

    appearance: Shell polished to a shimmer. Antennae wiggle when excited.
    voice: Practiced warmth that can't quite cover the anxious undercurrent.
    motivation: Tipped off by lost goods shipments from Mimbleburg and Trontsburry — including a rich shipment of pitch from a distillery that never arrived. Pragmatic and action-oriented. Quietly funding the investigation.
    personality: Warm and direct to the point of shocking her colleagues. Anxious underneath the polish.

    party_history:
      - "Session 0: Delivered the opening pitch with directness that startled T'wigfingers and Sven"
      - "Session 1: Left at the start — 'Well, I must be leaving, I have people to see, places to be'"
      - Not seen since Session 1

    hooks: []


  - name: Dr. T'wigfingers
    callsign: TF
    species: Stickbug
    role: Scientist, RJS branch lead
    affiliation: Royal Jelly Society
    status: Alive
    location: Chitinholm
    disposition: Positive
    first_met: Session 0
    last_seen: Session 1

    appearance: Nervous energy, academic precision.
    voice: Takes moments to compose himself before speaking about serious topics.
    motivation: Believes the worst about the Bloom. Cross-referenced refugee arrival data, lost-contact records, and messenger timing to identify the epicenter as directional. Motivated by science.
    personality: Genuinely fond of Bessie. Navigates the RJS labyrinth with ease.

    key_items:
      - Handed the party an ornate sealed tube containing his timetable, data points, map, and estimated direction. Advised leaving it sealed until Antennington.

    party_history:
      - "Session 0: Explained the triangulation plan and the Bloom's suspected epicenter"
      - "Session 1: Showed party the stockroom, introduced them to Bessie, escorted them to the gates"
      - "Session 1 farewell: 'He looked briefly at each of you, before giving a quick nod, and retreating back into the safety of the RJS'"

    hooks: []


  - name: Sven
    callsign: "7834 (official designation)"
    species: Obsidian black ant drone
    role: Agricultural data specialist
    affiliation: Royal Jelly Society — Sub-Committee on Impeding Winter Doom
    status: Alive
    location: Chitinholm
    disposition: Neutral-positive
    first_met: Session 0
    last_seen: Session 0

    appearance: The most eloquent drone you've ever encountered.
    voice: Says very little but what he says lands. Session 0 — cocked his head and said simply "A source."
    motivation: Agricultural data specialist. Mostly an observer. Yields dropping. Lost communication with other colonies. Before contact was lost, heard about raiding parties.
    personality: Furtive and quietly excited about the investigation. Led the party to the meeting room "dodging the disapproving looks of other scholars." Startled by Boodle's directness.

    party_history:
      - "Session 0: Guided party through the RJS to the meeting room. Present but spoke minimally."

    hooks: []


  - name: Garett
    species: Green weevil
    role: Magic researcher, RJS Antennington branch
    affiliation: Royal Jelly Society (Antennington branch)
    status: Alive
    location: Antennington Amber Mine — Level 2
    disposition: Positive
    first_met: Session 2
    last_seen: Session 3

    appearance: Fussily hunched over his table.
    voice: "Surprised by non-Ricko visitors: 'Oh! You aren't Ricko! Now this is a surprise. Who could you be, what do you want?'"
    motivation: Researches magic. Instruments detected a magical shockwave alongside the cold. Instruments needed mine isolation for best measurements — now destroyed. Can collect data but not process it geometrically — "it's not really within my wheelhouse." Coined the term "The Bloom."
    personality: Not leaving the mine. Not joining the party. More interested in the magical element than field work. Lovers with Ricko.

    key_info_given_to_party:
      - Rolled-up parchment with triangulation data
      - Named the event "The Bloom"
      - Described the magical shockwave component
      - Gave the party their first magic item: an chunk of amber that glows and reacts to increased levels of magic.

    party_history:
      - "Session 2: Met at the mine. Was at Antennington RJS when ants attacked — fled to the mine."
      - "'I have never seen an aggressive ant before, and I can't say I want to meet one.'"
      - Left the note in the RJS lab pinned with a hand-pickaxe
      - "Session 3: Nancy stayed overnight picking his brain about the Bloom. Built a detection box for the Ahganmin before the party departed."

    hooks:
      - His destroyed instruments — does he rebuild? Does he have more data?
      - Relationship with Ricko is a soft vulnerability if the party ever needs leverage


  - name: Ricko
    species: Ox beetle
    role: Mine surface operator
    affiliation: Antennington Amber Mine
    status: Alive
    location: Antennington Amber Mine — surface building
    disposition: Positive
    first_met: Session 2
    last_seen: Session 3

    appearance: Massive. Deep voice.
    voice: "'Hello? The door is open, come on in.' Working on a piece of amber when the party arrived."
    motivation: Mans the mine surface building and the hoist. Doesn't fully understand Garett's work — "I can't say I understood all the words he used." Lovers with Garett.
    personality: Unexpectedly warm and hospitable. "Must say, I was not expecting ANYONE to come through here anytime soon."

    party_history:
      - "Session 2: Welcomed the party, operated the lift to send them down to Garett"
      - Did not see the ant attack on Antennington — was in the mines

    hooks:
      - Sole above-ground presence at the mine — vulnerable if ants return


  - name: Bert
    species: Young cicada
    role: Cart driver
    affiliation: Independent (well paid)
    status: Alive
    location: Chitinholm (fled back)
    disposition: Neutral
    first_met: Session 1
    last_seen: Session 1

    motivation: Was hauling supplies to Chitinholm. Got knocked off the road by earwig bandits, ran straight back to Chitinholm with one of his packs.

    party_history:
      - "Session 1: Party intervened in the bandit attack on his cart"
      - Ran past the group and kept going to Chitinholm after the fight
      - Cart left behind — party repaired it and sent it back with Bessie and Drix's note

    hooks:
      - Fled to Chitinholm — will he report what happened? To whom?


  - name: Lars
    species: Earwig
    role: Former bandit, sole survivor of the burnt village
    affiliation: None (formerly one of the Session 1 road bandits)
    status: Alive — traumatized
    location: Burnt village (last known)
    disposition: Traumatized / unknown
    first_met: Session 2
    last_seen: Session 2

    appearance: Humble earwig farmer, with patched and worn clothes. 
    voice: |
      Words come out in pieces: "The raiders came. We should have been there. They're all dead."
      Then quieter: "The ants. The ants. They took them all."
    motivation: Survival. Grief. His village was the burnt village. Revenge against the party?
    backstory: Was one of the Session 1 road bandits. Arrived at his village just as ants were dragging the last villagers away. Left behind.

    key_info_given_to_party:
      - Two types of ants — black and red
      - Bodies dragged northeastish (party marked on map)

    party_history:
      - "Session 2: Party coaxed his story out with creative engagement, then left him behind with supplies"

    hooks:
      - Dangling thread — do not force
      - Options — stalks the party / realizes they're fighting ants and joins / joins and betrays / joins and stays loyal / harbors a grudge


