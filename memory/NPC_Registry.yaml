    role: Draft animal (RJS stables)
    affiliation: Royal Jelly Society
    status: Alive
    location: En route to Chitinholm (attached to repaired cart)
    disposition: Neutral
    first_met: Session 1
    last_seen: Session 1

    notes: >
      T'wigfingers — "She's all yours! If you do get lost, just set her free,
      I imagine she will make her way back here eventually."
