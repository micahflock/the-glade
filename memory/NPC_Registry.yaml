      attached to the repaired cart with Drix's note, heading back to Chitinholm.

    hooks: []


  - name: Bestie
    species: Pillbug
    role: Party pack animal (currently unattended)
    affiliation: Party (formerly pulling Bert's cart)
    status: Alive — tied up and left above the Winter Farm
    location: Ridge above the Winter Farm, tied with a snack and a blanket
    disposition: Warming to the party
    first_met: Session 1
    last_seen: Session 4

    hp: 20
    animal_handling_dc: 14

    notes: >
      Still hitched to the wagon after the fight — didn't bolt. "Just watches you,
      with the particular patience of something that has learned not to expect much."
      Drix performed on the walnut shell lute and won Bestie over.
      Night watch beat (Session 2): settled closer to camp than at dusk —
      "Not close enough to mean anything, probably. Just closer."
      Session 4: Party tied her up with a snack and a blanket near the ridge
      above the Winter Farm rather than release her or bring her in. She was
      left there when the party infiltrated the farm. Fate open.

    hooks:
      - "Tied up near the Winter Farm ridge — does she escape, get found, or become a beat later?"


  # ── MINOR / GROUP NPCS ──────────────────────────────────────────────────────

  - name: Earwig Bandits
    species: Earwigs
    role: Road bandits (encountered Session 1)
    status: All dead except for Lars, by the party's hand
    location: Scattered into the forest
    first_met: Session 1

    notes: >
      4 bandits + 1 leader. Farmers whose village was destroyed by red ants,
      forced into raiding. Clothes lovingly patched — stitched and restitched
      until original fabric is more memory than material.
      Weapons: sawed-off scythe, hoe on both ends.
      Would talk before attacking if not provoked.
      Negotiation DCs: Persuade 15, Intimidate 18 (DC 12 after one dead).

    hooks:
      - Scattered bandits could reappear — they know the party's faces


  - name: Shield Bug Family
    species: Shield bugs
    role: Refugees (road encounter)
    status: Fled toward Chitinholm
    location: Chitinholm (presumed)
    first_met: Session 1

    notes: >
      Were traveling with the cart but fled when it was attacked.
      Clattering around the corner, moving as fast as their luggage let them.
      Eyed the party uncertainly.

    hooks: []


  - name: Allen
    species: Leafcutter ant
    role: Body cart worker, rebel sympathizer, party guide
    status: Alive
    location: Winter Farm interior (last seen leaving the party at the fungal curtain chamber)
    disposition: Allied
    first_met: Session 3
    last_seen: Session 4

    voice: Flat and sure. "Good. They're better dead."
    motivation: Disgusted by the corpse farming. Has a contact in the resistance inside the Winter Farm. Doesn't have a plan — has conviction.
    personality: Steady, direct. Willing to threaten the Loyalist if necessary. Guided the party without hesitation once it was clear they were aligned with the Sporemother.

    key_info_given_to_party:
      - Leafcutters farm fungus on decomposing bodies
      - The leafcutter queen was coerced by the red ant queen
      - A resistance movement exists inside the farm
      - The leafcutters tried raiding alone before the alliance (the Antennington raid) and it went badly

    party_history:
      - "Session 3: Survived the road encounter. Impressed by party's quest to understand the Bloom. Offered to guide party to the Winter Farm."
      - "Session 4: Guided the party through the farm once they were past the entrance. Confirmed 'the Sporemother does not like the fire ants' after Drix dropped disguise. Led them through twisting leafcutter-only tunnels to the fungal curtain chamber, then walked away — he did not know how to proceed further. Party sentiment at end of session: 'Allen rules.'"

    hooks:
      - Potential long-term ally if the party earns trust
      - Still inside the Winter Farm; could aid or be endangered by future events


  - name: Greg
    species: Leafcutter ant
    role: Body cart worker, alliance loyalist (discredited)
    status: Alive — at large inside the Winter Farm, credibility destroyed
    location: Winter Farm interior (disappeared among the workers)
    disposition: Hostile (covert), but discredited
    first_met: Session 3
    last_seen: Session 4

    voice: Panicked, urgent. Mandibles clicking fast.
    motivation: Survival. Believes the alliance is the only rational path. Terrified of consequences now that fire ants are dead and he's implicated.
    personality: Not evil — practical. His framework is follow the queen, do what you're told, survive. Now that framework has collapsed.

    party_history:
      - "Session 3: Cowed by Nancy ('might makes right doesn't sit with me') but not won over. Planning to betray the party at earliest opportunity."
      - "Session 4: Nancy sent him a Message — 'I'm watching you and I will kill you if you act out.' He rolled a 6 on his save and held his nerve only until the descent. As the party approached the farm entrance, Greg broke and bolted across the frozen river toward the farm. Drix — in fire-ant disguise — pre-emptively yelled that Greg was 'acting crazy and has a fungus in his brain.' Greg's credibility collapsed before he arrived; he disappeared into the leafcutter workers. Party sentiment: 'Greg sucks.'"

    hooks:
      - At large inside the farm; could resurface as a ragged, discredited antagonist later
      - Ran into cover with a story that nobody believed — lives in shame among his own


  - name: Sporemother Vell
    species: Leafcutter ant
    role: Rebel cell leader, senior fungal tender
    affiliation: Winter Farm — rebel cell
    status: Alive
    location: Winter Farm — rebel cell chamber, behind the fungal curtain
    disposition: Allied
    first_met: Session 4
    last_seen: Session 4

    appearance: Old enough that her generation remembers life before the Bloom. A matriarch — something above Worker but below Queen. A senior tender.
    voice: Measured, deliberate. Every word placed carefully — she's still getting used to the idea that words can change things if you arrange them right.
    motivation: Personal, not political. She can't tend her leaf fungus gardens anymore. The old ways are gone. That's what drives her — not ideology, but the loss of the thing she was born to do and did beautifully.
    personality: Fiery underneath steely composure. Maternal in the way of someone who raised an entire fungus garden for decades and watched it taken away. Leafcutters have always just done what their queen wants — rebellion is a totally new concept. Vell is discovering what leadership means in real time.

    key_dialogue:
      - "'I've been growing things my whole life. I know what fungus needs. I know what soil needs. I know what happens when you take the rot out of the world and leave everything perfect and green and completely, utterly useless.'"
      - "'The red queen took our queen. Took our purpose. Turned us into gravediggers. And my people just… did it. Because that's what we do. We're told, and we do.'"
      - "'I don't think it's supposed to work like this.'"
      - "If the party reveals their quest: 'If what you're doing works — if things can rot again — we don't need the red ants. The alliance falls apart on its own.'"

    party_history:
      - "Session 4: Met by the party in the rebel cell chamber after they solved the fungal curtain. Parleyed with Nancy. Confirmed the source of the Bloom. Mentioned that her home is the Overgrowth. Alluded to other powers given to other species beyond fire ants. Described the red queen as subject to moodiness. Gave the party the mandate to bring news of the Bloom's source to the leafcutter queen — not to free her, but to tell her there is an alternative so she can choose to break the alliance on her own terms. Arranged escort (Antshley) through the tunnel into the Overgrowth."

    cell_members:
      - "Older assistant / nervous doubter — carved the Runes of Fungal Protection onto each party member. Believes in the old superstitions. [name not yet established]"
      - "One or two other leafcutters at the table, quieter, unnamed."

    hooks:
      - Core dilemma she voices: "Even if we overthrow them… how do we eat?"
      - The rebellion is inept — leafcutters have never organized laterally before. Vell is learning leadership in real time.
      - Her home is the Overgrowth — displaced from it by the alliance.


  - name: Antshley
    species: Leafcutter ant
    role: Rebel escort — guiding the party to the leafcutter queen
    affiliation: Winter Farm — rebel cell (Sporemother Vell's cell)
    status: Alive
    location: Overgrowth tunnel / en route to the leafcutter queen with the party
    disposition: Allied (player affection — Heather flagged with a heart)
    first_met: Session 4
    last_seen: Session 4

    party_history:
      - "Session 4: Volunteered at the rebel cell meeting to escort the party to the leafcutter queen. Led them back through the Winter Farm tunnels, under the unseen barrier, and into the Overgrowth. Traveling with the party as of end of session."

    hooks:
      - Heather has attached to this character — treat as developed recurring NPC, not disposable
      - Her presence at the queen audience — does she speak for Vell? Has she been to the queen before?


  - name: The Old Assistant
    species: Leafcutter ant
    role: Rebel cell member, rune-carver, nervous doubter
    affiliation: Winter Farm — Sporemother Vell's cell
    status: Alive
    location: Winter Farm — rebel cell chamber
    disposition: Allied (anxious)
    first_met: Session 4
    last_seen: Session 4

    voice: Anxious, theatrical worry. "Some call it superstition, but us old-timers still believe in it."
    motivation: Remembers the old ways too well. Terrified of what happens if the rebellion fails.
    personality: The nervous doubter role from the draft — voices the counter-argument of "but if we stop, we starve." Old enough to carry the old superstitions and the old rites.

    key_items_given_to_party:
      - Rune of Fungal Protection carved onto each party member's carapace. Protects against fungal infection. [Mechanical effect TBD.]
      - "Nancy: top of the right pauldron / shoulder"
      - "Drix: lower back ('tramp stamp')"
      - "Tabby: back of the left shoulder"

    party_history:
      - "Session 4: Carved the Runes of Fungal Protection onto all three PCs. Delivered exposition about magic escalation — the red queen 'wreathed in fire,' the leafcutter queen's unnatural fungal obsession."

    hooks:
      - Name not yet established at the table. [DM CHECK]
      - The rune's mechanical effect is deferred. Specify before the cordyceps payoff arrives.


