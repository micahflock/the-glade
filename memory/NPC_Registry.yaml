  - name: Leafcutter Rebel
    species: Leafcutter ant
    role: Body cart worker, rebel sympathizer
    status: Alive
    location: With the party (road encounter site, heading to Winter Farm)
    disposition: Allied
    first_met: Session 3
    last_seen: Session 3

    voice: Flat and sure. "Good. They're better dead."
    motivation: Disgusted by the corpse farming. Has a contact in the resistance inside the Winter Farm. Doesn't have a plan — has conviction.
    personality: Steady, direct. Willing to threaten the Loyalist if necessary.

    key_info_given_to_party:
      - Leafcutters farm fungus on decomposing bodies
      - The leafcutter queen was coerced by the red ant queen
      - A resistance movement exists inside the farm
      - The leafcutters tried raiding alone before the alliance (the Antennington raid) and it went badly

    party_history:
      - "Session 3: Survived the road encounter. Impressed by party's quest to understand the Bloom. Offered to guide party to the Winter Farm."

    hooks:
      - Connection to the rebel cell inside the Winter Farm — leads to Grainmother Vell
      - Potential long-term ally if the party earns trust


  - name: Leafcutter Loyalist
    species: Leafcutter ant
    role: Body cart worker, alliance loyalist
    status: Alive
    location: With the party (road encounter site, heading to Winter Farm)
    disposition: Hostile (covert)
    first_met: Session 3
    last_seen: Session 3

    voice: Panicked, urgent. Mandibles clicking fast.
    motivation: Survival. Believes the alliance is the only rational path. Terrified of consequences now that fire ants are dead and he's implicated.
    personality: Not evil — practical. His framework is follow the queen, do what you're told, survive. Now that framework has collapsed.

    party_history:
      - "Session 3: Cowed by Nancy ('might makes right doesn't sit with me') but not won over. Planning to betray the party at earliest opportunity."

    hooks:
      - Ticking liability — will sprint to alert red ant discipline guards if unwatched near the farm entrance
      - Could be turned with sufficient evidence that the Bloom can be undone (removing his 'but how do we eat?' objection)


  # ── NOT YET MET ─────────────────────────────────────────────────────────────

  - name: Grainmother Vell
    species: Leafcutter ant
    role: Rebel cell leader, senior fungal tender
    affiliation: Winter Farm — rebel cell
    status: Alive
    location: Winter Farm — deep complex, behind a deliberate collapse
    disposition: Not yet met
    first_met: null
    last_seen: null

    appearance: Old enough that her generation remembers life before the Bloom. A matriarch — something above Worker but below Queen. A senior tender.
    voice: Measured, deliberate. Every word placed carefully — she's still getting used to the idea that words can change things if you arrange them right.
    motivation: Personal, not political. She can't tend her leaf fungus gardens anymore. The old ways are gone. That's what drives her — not ideology, but the loss of the thing she was born to do and did beautifully.
    personality: Fiery underneath steely composure. Maternal in the way of someone who raised an entire fungus garden for decades and watched it taken away. Leafcutters have always just done what their queen wants — rebellion is a totally new concept. Vell is discovering what leadership means in real time.

    key_dialogue:
      - "'I've been growing things my whole life. I know what fungus needs. I know what soil needs. I know what happens when you take the rot out of the world and leave everything perfect and green and completely, utterly useless.'"
      - "'The red queen took our queen. Took our purpose. Turned us into gravediggers. And my people just… did it. Because that's what we do. We're told, and we do.'"
      - "'I don't think it's supposed to work like this.'"
      - "If the party reveals their quest: 'If what you're doing works — if things can rot again — we don't need the red ants. The alliance falls apart on its own.'"

    cell_members:
      - A true believer — younger, possibly born post-Bloom. Furious on principle. Aggressive, maybe reckless.
      - A nervous doubter — older, remembers the old ways. Terrified of what happens if the rebellion fails.
      - A quiet competent — handles logistics. Knows tunnel layouts, guard rotations, supply schedules. The one Vell relies on.

    hooks:
      - If party reveals their quest, she fast-tracks them: safe passage, zone barrier crossing, rebel contacts deeper in the Overgrowth
      - Core dilemma she voices: "Even if we overthrow them… how do we eat?"
      - The rebellion is inept — leafcutters have never organized laterally before. Vell is learning leadership in real time.


