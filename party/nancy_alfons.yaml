      level: 1
      school: illusion
    - name: Detect Magic       # likely Fey Touched bonus (1st-level divination)
      level: 1
      school: divination
      ritual: true
    - name: Identify
      level: 1
      school: divination
      ritual: true
    - name: Sleep              # added 2026-04-27
      level: 1
      school: enchantment
    - name: Tasha's Hideous Laughter   # added 2026-04-27
      level: 1
      school: enchantment
    - name: Shield             # added 2026-04-27
      level: 1
      school: abjuration
    - name: Tenser's Floating Disk     # added 2026-04-27
      level: 1
      school: conjuration
      ritual: true
    - name: Misty Step         # Fey Touched bonus — 1/long rest without slot
      level: 2
      school: conjuration

spell_slots:
