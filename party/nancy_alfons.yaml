features_and_traits:
  - name: Mobile
    source: Feat
    description: >
      +10 speed. If you Dash, you ignore difficult terrain for the rest of the
      turn. When you make a melee attack against a creature, that creature
      cannot make opportunity attacks against you for the rest of the turn.
  - name: Fey Touched
    source: Feat
    description: >
      INT/WIS/CHA +1. Learn Misty Step (2nd-level conjuration) and one 1st-level
      divination or enchantment spell (Nancy: Detect Magic). Cast each once per
      long rest without a spell slot; can also cast using spell slots normally.
  - name: Mage Hand Legerdemain
    source: Rogue (Arcane Trickster) 3
    description: >
      The spectral hand from Mage Hand is invisible, can perform Sleight of Hand
      (stow/pick pocket), pick locks, disarm traps, or pour out vials at range,
      using your action.
  - name: Arcane Recovery
    source: Wizard 1
    description: >
      Once per day on a short rest, recover spell slots whose combined level
      equals up to half your wizard level (rounded up); only 1st-level slots
      at Wizard 2.
  - name: Bladesong
    source: Wizard (Bladesinger) 2
    description: >
      Bonus action; lasts 1 minute. Requires one free hand and no medium/heavy
      armor or shield. While active: +INT mod (+3) to AC; walking speed +10;
      advantage on Dexterity (Acrobatics) checks; +INT mod (+3) to concentration
      saves; once per turn add INT mod to one weapon damage roll. Usable a
      number of times equal to proficiency bonus per long rest, recovered on a
      short or long rest. Ends if incapacitated, in medium/heavy armor or
      shield, or when ended as no action.
  - name: Training in War and Song
    source: Wizard (Bladesinger) 2
    description: >
      Proficiency with light armor, one one-handed melee weapon of choice, and
      Performance.

backstory:
  - Nancy was hired to steal something from a wizard. Instead of stabbing the
    wizard, he got caught. He spent 14 months imprisoned before escaping —
    carved his way out with a spoon. Still completed the job. (Shared by player
    during Session 2 camp scene.)
  - Thoraxville was mentioned by Nancy in passing during the same scene —
    flagged for development.

