features_and_traits:
  - name: "Favored Enemy: Mammals, Plants"
    source: Ranger 1 (revised at level 6 per updated sheet)
    description: >
      Advantage on Wisdom checks to track. Advantage on Intelligence
      checks to recall info about.

  - name: "Favored Terrain: Forest, Arctic"
    source: Ranger 1 (Arctic added at level 6 per updated sheet)
    description: >
      Difficult terrain doesn't slow group's travel. Group can't become
      lost except by magical means. Remain alert to danger. If moving
      alone, can move stealthily at normal pace. While tracking, can
      learn creatures' exact number, sizes, and how long ago they
      passed through.

  - name: "Fighting Style: Archery"
    source: Ranger 2
    description: >
      +2 bonus to attack rolls with ranged weapons.

  - name: Primeval Awareness
    source: Ranger 2
    description: >
      Use an action + 1 spell slot to focus awareness. For 1 minute per
      level of spell slot, you can sense whether the following creatures
      are within 1 mile (6 miles in forest): aberrations, celestials,
      dragons, elementals, fey, fiends, undead.

  - name: Dread Ambusher
    source: Gloomstalker 3
    description: >
      Add Wisdom modifier to initiative rolls. At start of your first
      turn of each combat, walking speed increases by 10ft. If you
      attack during first turn, can make an additional attack as part
      of action. If that attack hits, target takes an extra 1d8 damage.

  - name: Umbral Sight
    source: Gloomstalker 3
    description: >
      60ft darkvision. Adept at evading creatures with darkvision. In
      darkness, invisible to creatures with darkvision.

  - name: Sharpshooter
    source: Bonus feat (homebrew) — preserved at level-6 update per DM
    description: >
      Attacking at long range doesn't impose disadvantage on ranged
      weapon attack rolls. Ranged weapon attacks ignore half cover and
      3/4 cover. Before you make an attack with a ranged weapon you can
      choose to take a -5 penalty to the attack roll. If the attack
      hits, you add +10 to the attack's damage.

  - name: Wanderer
    source: Outlander background
    description: >
      Have an excellent memory for maps and geography. Can always recall
      the general layout of terrain, settlements, and other features
      around you. Can find food and fresh water for myself and up to 5
      people.

notes:
  - "Languages not listed — ask player."
  - "Session 3 player attitude: Overwhelmed by the triangulation math, enjoys the group dynamic."
  - "Session 4 level-up to 6: crossed the unseen barrier into the Overgrowth with the party. Derived stats reconciled to level 6 in the 2026-04-29 update (proficiency bonus +3, DEX 18, Extra Attack, 2nd-level slots, full spell list captured)."
  - "Session 4 roleplay beats: cold-open observation that red ants shouldn't be able to throw fire; rode into the farm playing dead in the cart and was carried by workers into the fungus chamber; asked the sympathetic leafcutter how the last person passed through the fungal curtain, getting the 'soft, then stomp, then hush' pattern that solved the puzzle."
  - "Session 4 rune placement: Rune of Fungal Protection carved on the back of the left shoulder. Mechanical effect TBD."
  - "Note on sheet arithmetic: handwritten sheet used proficiency bonus +2 throughout; corrected to +3 (RAW for level 6) per DM. Sheet's DEX skills (Acrobatics +3, Sleight of Hand +3, Stealth +5) were not updated for the new DEX 18 — re-derived here."
