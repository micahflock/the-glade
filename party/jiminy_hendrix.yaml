features_and_traits:
  - name: Bardic Inspiration
    source: Bard 1
    description: >
      D8 x 5 uses (die upgraded at Bard 5). Bonus action to grant
      one creature within 60 feet an inspiration die.

  - name: Jack of All Trades
    source: Bard 2
    description: >
      Add half your proficiency bonus, rounded down, to any ability
      check you make that doesn't already include your proficiency bonus.

  - name: Song of Rest
    source: Bard 2
    description: >
      Extra D6 to everyone during short rest.

  - name: Expertise
    source: Bard 3
    description: >
      Double proficiency bonus for Performance and Persuasion.

  - name: Bonus Proficiencies
    source: College of Lore 3
    description: >
      Three additional skill proficiencies from College of Lore.
      Investigation confirmed as one of these (DM 2026-04-28); other
      two not yet enumerated — ask player.

  - name: Cutting Words
    source: College of Lore 3
    description: >
      Use Bardic Inspiration die to subtract from an enemy's attack
      roll, ability check, or damage roll.

  - name: Ability Score Improvement
    source: Bard 4
    description: >
      +2 Charisma (18 → 20).

  - name: Font of Inspiration
    source: Bard 5
    description: >
      Bardic Inspiration die becomes d8 and recovers on a short or
      long rest (no longer just long rest).

  - name: Magical Secrets
    source: College of Lore 6
    description: >
      Two spells learned from any class, counted as bard spells.
      Selected: Counterspell (3rd) and Leomund's Tiny Hut (3rd).

  - name: Song Distraction
    source: Homebrew
    description: >
      Can distract with song. Performance check vs Insight. If succeed,
      grab attention so it makes Perception and Investigation with
      disadvantage until you stop performing.

